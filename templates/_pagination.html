{% if page_info.total_pages > 1 or page_info.total > 0 %}
<div class="pagination">
  {% if page_info.has_prev %}
    <a class="mini-btn" href="{{ page_base_url }}?page={{ page_info.page - 1 }}">← Prev</a>
  {% else %}
    <span class="mini-btn disabled">← Prev</span>
  {% endif %}
  <span class="pagination-info">Page {{ page_info.page }} of {{ page_info.total_pages }} &nbsp;·&nbsp; {{ page_info.total }} total</span>
  {% if page_info.has_next %}
    <a class="mini-btn" href="{{ page_base_url }}?page={{ page_info.page + 1 }}">Next →</a>
  {% else %}
    <span class="mini-btn disabled">Next →</span>
  {% endif %}
</div>
{% endif %}
