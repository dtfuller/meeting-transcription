<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script>
    (function () {
      const t = localStorage.getItem('transcribe.theme') || 'auto';
      document.documentElement.dataset.theme = t;
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Transcribe{% endblock %}</title>
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <header class="app-bar">
    <h1><a href="/" class="app-title">Transcribe</a></h1>
    <form class="search" method="get" action="/search" role="search">
      <input type="search" name="q" placeholder="Search meetings…" aria-label="Search">
    </form>
    <nav class="tabs" aria-label="Main tabs">
      <a href="/meetings" class="tab {% if active_tab == 'meetings' %}active{% endif %}"
         {% if active_tab == 'meetings' %}aria-current="page"{% endif %}>Meetings</a>
      <a href="/inbox" class="tab {% if active_tab == 'inbox' %}active{% endif %}"
         {% if active_tab == 'inbox' %}aria-current="page"{% endif %}>
        Inbox
        {% if inbox_count %}<span class="count">{{ inbox_count }}</span>{% endif %}
      </a>
      <a href="/speakers" class="tab {% if active_tab == 'speakers' %}active{% endif %}"
         {% if active_tab == 'speakers' %}aria-current="page"{% endif %}>
        Speakers
        {% if speakers_count %}<span class="count">{{ speakers_count }}</span>{% endif %}
      </a>
      <a href="/pipeline" class="tab {% if active_tab == 'pipeline' %}active{% endif %}"
         {% if active_tab == 'pipeline' %}aria-current="page"{% endif %}>
        Pipeline
        {% if pipeline_running %}<span class="running">running</span>{% endif %}
      </a>
    </nav>
    <button type="button" class="theme-toggle" id="theme-toggle" aria-label="Toggle theme" title="Toggle theme">◐</button>
    <a href="/config" class="gear" aria-label="Settings" title="Settings">⚙</a>
  </header>
  <main class="app-main">
    {% block content %}{% endblock %}
  </main>
  <script>
    (function () {
      const btn = document.getElementById('theme-toggle');
      if (!btn) return;
      const glyphs = { auto: '◐', light: '☀', dark: '☾' };
      const cycle = { auto: 'light', light: 'dark', dark: 'auto' };
      function paint() {
        btn.textContent = glyphs[document.documentElement.dataset.theme] || '◐';
      }
      paint();
      btn.addEventListener('click', function () {
        const next = cycle[document.documentElement.dataset.theme] || 'light';
        document.documentElement.dataset.theme = next;
        localStorage.setItem('transcribe.theme', next);
        paint();
      });
    })();
  </script>
</body>
</html>
