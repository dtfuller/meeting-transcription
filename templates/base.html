<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8">
  <script>
    (function () {
      const t = localStorage.getItem('transcribe.theme') || 'auto';
      document.documentElement.dataset.theme = t;
    })();
  </script>
  <meta name="viewport" content="width=device-width, initial-scale=1">
  <title>{% block title %}Transcribe{% endblock %}</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link rel="stylesheet" href="https://fonts.googleapis.com/css2?family=Geist:wght@400;500;600;700&family=Source+Serif+4:ital,wght@0,400;0,500;0,600;0,700;1,400&family=JetBrains+Mono:wght@400;500;600&display=swap">
  <link rel="stylesheet" href="/static/app.css">
  <script src="/static/htmx.min.js"></script>
</head>
<body>
  <header class="app-bar">
    <h1><a href="/" class="app-title">Transcribe</a></h1>
    <form class="search" method="get" action="/search" role="search">
      <input type="search" name="q"
             placeholder="Search meetings…"
             aria-label="Search"
             autocomplete="off"
             hx-get="/search/partial"
             hx-trigger="keyup changed delay:250ms, search"
             hx-target="#search-dropdown"
             hx-swap="innerHTML">
      <div id="search-dropdown" class="search-dropdown"></div>
    </form>
    <nav class="tabs" aria-label="Main tabs">
      <a href="/meetings" class="tab {% if active_tab == 'meetings' %}active{% endif %}"
         {% if active_tab == 'meetings' %}aria-current="page"{% endif %}>Meetings</a>
      <a href="/inbox" class="tab {% if active_tab == 'inbox' %}active{% endif %}"
         {% if active_tab == 'inbox' %}aria-current="page"{% endif %}>
        Inbox
        {% if inbox_count %}<span class="count">{{ inbox_count }}</span>{% endif %}
      </a>
      <a href="/speakers" class="tab {% if active_tab == 'speakers' %}active{% endif %}"
         {% if active_tab == 'speakers' %}aria-current="page"{% endif %}>
        Speakers
        {% if speakers_count %}<span class="count">{{ speakers_count }}</span>{% endif %}
      </a>
      <a href="/pipeline" class="tab {% if active_tab == 'pipeline' %}active{% endif %}"
         {% if active_tab == 'pipeline' %}aria-current="page"{% endif %}>
        Pipeline
        {% if pipeline_running %}<span class="running">running</span>{% endif %}
      </a>
    </nav>
    <div class="app-right">
      <select class="theme-toggle" id="theme-toggle" aria-label="Theme" title="Theme">
        <option value="auto">◐ Auto</option>
        <option value="light">☀ Light</option>
        <option value="dark">☾ Dark</option>
      </select>
      <a href="/config" class="gear" aria-label="Settings" title="Settings">⚙</a>
    </div>
  </header>
  <main class="app-main">
    {% block content %}{% endblock %}
  </main>
  <script>
    (function () {
      const sel = document.getElementById('theme-toggle');
      if (!sel) return;
      sel.value = document.documentElement.dataset.theme || 'auto';
      sel.addEventListener('change', function () {
        document.documentElement.dataset.theme = sel.value;
        localStorage.setItem('transcribe.theme', sel.value);
      });
    })();
  </script>
  <script>
    (function () {
      const dd = document.getElementById('search-dropdown');
      if (!dd) return;
      document.addEventListener('click', function (e) {
        const form = e.target.closest('.search');
        if (!form) dd.innerHTML = '';
      });
    })();
  </script>
  <script>
    (function () {
      document.querySelectorAll('.toast-flash').forEach(function (el) {
        const ms = parseInt(el.getAttribute('data-dismiss-ms') || '5000', 10);
        const hide = function () {
          el.classList.add('toast-hide');
          setTimeout(function () { el.remove(); }, 400);
        };
        setTimeout(hide, ms);
        const closeBtn = el.querySelector('.toast-close');
        if (closeBtn) closeBtn.addEventListener('click', hide);
      });
    })();
  </script>
  <script>
    (function () {
      document.addEventListener('click', function (e) {
        const btn = e.target.closest('.tree-toggle-all');
        if (!btn) return;
        e.preventDefault();
        const tree = btn.closest('.tree');
        if (!tree) return;
        const details = tree.querySelectorAll('details.folder-group, details.month-group');
        const anyOpen = Array.from(details).some(function (d) { return d.hasAttribute('open'); });
        if (anyOpen) {
          details.forEach(function (d) { d.removeAttribute('open'); });
          btn.textContent = 'Expand all';
        } else {
          details.forEach(function (d) { d.setAttribute('open', ''); });
          btn.textContent = 'Collapse all';
        }
      });
    })();
  </script>
  <script>
    (function () {
      document.addEventListener('click', function (e) {
        const btn = e.target.closest('.more-toggle');
        if (!btn) return;
        e.preventDefault();
        const overflow = btn.nextElementSibling;
        if (!overflow || !overflow.classList.contains('row-tags-overflow')) return;
        const wasHidden = overflow.hasAttribute('hidden');
        if (wasHidden) {
          overflow.removeAttribute('hidden');
          btn.setAttribute('aria-expanded', 'true');
          btn.textContent = 'show less';
        } else {
          overflow.setAttribute('hidden', '');
          btn.setAttribute('aria-expanded', 'false');
          btn.textContent = '+' + overflow.querySelectorAll('.tag').length + ' more';
        }
      });
    })();
  </script>
</body>
</html>
